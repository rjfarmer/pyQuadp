name: Publish to pypi
on: [push, pull_request]

permissions: {}

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14, macos-15]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: fortran-lang/setup-fortran@2a1b9c55897d827a9dfeb114408f3615e53b2b72 # v1
        id: setup-fortran
        with:
          compiler: gcc
          version: 13

      # Used to host cibuildwheel
      - uses: actions/setup-python@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.2
          python -m pip install build wheel pip-tools auditwheel pipx
          pip-compile -o requirements.txt --extra test --strip-extras
          python -m pip install -r requirements.txt
          python -m pip install numpy==2.0.0


      - if: runner.os == 'Windows'
        name: Export toolchain paths
        shell: pwsh
        run: |
          $gcc = "${{ steps.setup-fortran.outputs.cc }}"
          "CC=$gcc" >> $env:GITHUB_ENV
          "CXX=${{ steps.setup-fortran.outputs.cxx }}" >> $env:GITHUB_ENV
          "FC=${{ steps.setup-fortran.outputs.fc }}" >> $env:GITHUB_ENV

          $inc = & $gcc -print-file-name=include
          $libquadmath = & $gcc -print-file-name=libquadmath.dll
          $libdir = Split-Path $libquadmath -Parent

          "CPPFLAGS=-I$inc" >> $env:GITHUB_ENV
          "LDFLAGS=-L$libdir" >> $env:GITHUB_ENV



      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          # Py_LIMITED_API / abi3 wheels are not supported on free-threaded CPython yet.
          CIBW_SKIP: "cp3??t-*"
          


      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.2
          python -m pip install build wheel pip-tools auditwheel pipx
          pip-compile -o requirements.txt --extra test --strip-extras
          python -m pip install -r requirements.txt
          python -m pip install numpy==2.1.0

      - name: Build sdist
        run: python3 -m build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyQuadP
    permissions:
      id-token: write
    # or, alternatively, upload to PyPI on every tag starting with 'v' (remove on: release above to use this)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

